<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Student Registration Form</h1>
    </header>
    <main>
      <form action="#">
        <label for="roll">Roll No:</label>
        <input type="text" id="roll" /><br /><br />
        <div>
          <label for="firstname">Name:</label>
          <input type="text" id="firstname" placeholder="First Name" />
          <input
            type="text"
            id="lastname"
            placeholder="Last Name"
          /><br /><br />
        </div >
        <label for="Father"> Father's Name:</label>
        <input type="text" id="Father" /><br /><br />
        <label for="Day">Date of Birth:</label>
        <input type="date" id="Day" /><br /><br />
        <label for="mobile"> Mobile No:</label>
        <input type="number" id="mobile" pattern="+91" /><br /><br />
        <label for="Email"> Email id:</label>
        <input type="email" id="Email" /><br /><br />
        <label for="Password">Password:</label>
        <input type="password" id="password" /><br />
        <div class="horizontal-group">
          <p>Gender:</p>
          <label for="male">Male</label>
          <input type="radio" id="male" value="Male" name="gender" />
          <label for="female">Female</label>
          <input type="radio" id="female" value="Female" name="gender" />
        </div>
        <div class="horizontal-group">
          <p>Department:</p>
          <label for="CSE">CSE</label>
          <input type="checkbox" name="Department[]" id="CSE" />
          <label for="IT">IT</label>
          <input type="checkbox" name="Department[]" id="IT" />
          <label for="ECE">ECE</label>
          <input type="checkbox" name="Department[]" id="ECE" />
          <label for="civil">civil</label>
          <input type="checkbox" name="Department[]" id="civil" />
          <label for="Mech">Mech</label>
          <input type="checkbox" name="Department[]" id="Mech" />
        </div>
        <label for="course"> Course:</label>
        <select name="Course" id="course">
          <option value="Select">---Select---</option>
          <option value="Btech">Btech</option>
          <option value="Msc">Msc</option>
          <option value="BA">BA</option></select
        ><br /><br />
        <label for="photo"> Student photo:</label>
        <input
          type="file"
          id="photo"
          name="photo"
          accept="image/*"
        /><br /><br />

        <label for="city"> City:</label>
        <input type="text" id="city" /><br /><br />

        <label for="address"> Address:</label>
        <textarea id="address" name="address" rows="5" cols="30"></textarea
        ><br /><br />
        <label for="submit"></label>
        <input type="submit" value="Register" id="submit" />
      </form>
    </main>
  </body>
</html>
